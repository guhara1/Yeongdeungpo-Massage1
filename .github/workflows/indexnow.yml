name: IndexNow notify

# main 에 푸시되면(= 글/페이지 변경) Cloudflare Pages 배포를 기다린 뒤
# 사이트맵의 모든 URL을 IndexNow(빙·네이버·얀덱스)로 통보합니다.
# 저장소 Settings → Actions 에서 워크플로 실행이 허용돼 있어야 합니다.

on:
  push:
    branches: [main]
    paths:
      - "content/**"
      - "build.py"
      - "**/index.html"
      - "sitemap.xml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: indexnow
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Wait for Cloudflare Pages deploy
        run: sleep 120
      - name: Notify IndexNow (all URLs)
        run: python tools/indexnow.py
